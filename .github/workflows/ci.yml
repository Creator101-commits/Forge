name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  PNPM_VERSION: 9.15.0
  NODE_VERSION: "24"

jobs:
  # ── Frontend checks (fast, no platform matrix needed) ──
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable corepack & install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: |
          store_path="$(pnpm store path --silent 2>/dev/null || true)"
          if [ -z "$store_path" ]; then
            store_path="$HOME/.pnpm-store"
          fi
          echo "store=$store_path" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.store || '~/.pnpm-store' }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-
            pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests (with coverage)
        run: pnpm test:coverage

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # ── Rust checks across all platforms ──
  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable corepack & install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: |
          store_path="$(pnpm store path --silent 2>/dev/null || true)"
          if [ -z "$store_path" ]; then
            store_path="$HOME/.pnpm-store"
          fi
          echo "store=$store_path" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.store || '~/.pnpm-store' }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-
            pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libudev-dev

      - name: Rust format check
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Rust clippy
        run: cargo clippy --all-targets --features test-keyring -- -D warnings
        working-directory: src-tauri

      - name: Rust check
        run: cargo check --features test-keyring
        working-directory: src-tauri

      - name: Rust tests
        run: cargo test --lib --features test-keyring
        working-directory: src-tauri

      - name: Check MSRV compiles
        run: cargo check --features test-keyring
        working-directory: src-tauri
        env:
          CARGO_RESOLVER_INCOMPATIBLE_RUST_VERSIONS: "fallback"

  # ── Security & dependency checks ──
  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable corepack & install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (npm vulnerabilities)
        run: pnpm audit --audit-level=high || echo "Vulnerabilities found — review results"
        continue-on-error: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: cargo-deny — advisory check (RustSec DB)
        run: cargo deny check advisories
        working-directory: src-tauri
        continue-on-error: true

      - name: cargo-deny — license compliance
        run: cargo deny check licenses
        working-directory: src-tauri
        continue-on-error: true

      - name: cargo-deny — crate bans (duplicate versions, wildcards)
        run: cargo deny check bans
        working-directory: src-tauri

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo-audit (legacy advisory check)
        run: cargo audit
        working-directory: src-tauri
        continue-on-error: true

  # ── Build check (full compile) ──
  build:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable corepack & install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: |
          store_path="$(pnpm store path --silent 2>/dev/null || true)"
          if [ -z "$store_path" ]; then
            store_path="$HOME/.pnpm-store"
          fi
          echo "store=$store_path" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.store || '~/.pnpm-store' }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-
            pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libudev-dev

      - name: Tauri build (dev profile)
        run: cargo build --features test-keyring
        working-directory: src-tauri

  # ── E2E tests (Playwright, Linux only) ──
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: [frontend, rust]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable corepack & install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: |
          store_path="$(pnpm store path --silent 2>/dev/null || true)"
          if [ -z "$store_path" ]; then
            store_path="$HOME/.pnpm-store"
          fi
          echo "store=$store_path" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.store || '~/.pnpm-store' }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-
            pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run E2E tests
        run: pnpm test:e2e
